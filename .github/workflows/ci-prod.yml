name: ci-prod

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: write
  issues: write
  pull-requests: write

jobs:
  build:
    name: 'Build and Push'
    runs-on: ubuntu-latest
    environment: pfm-api-prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Generate Tag
        id: generate_tag
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.ARN_ECR_ROLE }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to AWS ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker Image
        id: build-docker-image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry}}
          TAG: ${{ steps.generate_tag.outputs.sha }}
        run: |
          docker build -t $REGISTRY/pfm-ci:$TAG .
          docker tag $REGISTRY/pfm-ci:$TAG $REGISTRY/pfm-ci:latest
          docker push --all-tags $REGISTRY/pfm-ci
          IMAGE=$(echo $REGISTRY/pfm-ci:$TAG)
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      # - name: Build Docker Image
      #   uses: docker/build-push-action@v5
      #   id: build-docker-image
      #   with:
      #     push: true
      #     tags: ${{ steps.login-ecr.outputs.registry }}/pfm-ci:${{ steps.generate_tag.outputs.sha }}, ${{ steps.login-ecr.outputs.registry }}/pfm-ci:latest

      - name: Deploy to App Runner
        id: deploy-app-runner
        uses: awslabs/amazon-app-runner-deploy@main
        with:
          service: ${{ vars.SERVICE_NAME }}
          image: ${{ steps.build-docker-image.outputs.image }}
          access-role-arn: ${{ secrets.ARN_APP_RUNNER_ROLE }}
          region: ${{ secrets.AWS_REGION }}
          cpu: 1
          memory: 2
          port: 3000
          wait-for-service-stability-seconds: 180

      - name: App Runner Check
        run: echo "App Runner running... ${{ steps.deploy-app-runner.outputs.service-url}}"