name: ci

on:
  push:
    branches:
      - dev

jobs:
  build:
    name: 'Build and Push'
    runs-on: ubuntu-latest
    environment: pfm-api-dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Tag
        id: generate_tag
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Login into the container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: rgbkeys/pfm-ci-api:${{ steps.generate_tag.outputs.sha }}, rgbkeys/pfm-ci-api:latest

      # - name: Run docker image
      #   run: docker build -t rgbkeys/pfm-ci-api:${{ steps.generate_tag.outputs.sha }} .

      # - name: Push image
      #   run: docker push rgbkeys/pfm-ci-api:${{ steps.generate_tag.outputs.sha }}