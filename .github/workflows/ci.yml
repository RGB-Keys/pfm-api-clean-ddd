name: ci

on:
  push:
    branches:
      - main
      - dev

jobs:
  build:
    name: 'Build'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate Tag
        id: generate_tag
        run: |
          SHA=$(echo $GITHUB_SHA | cut -c7)
          echo "sha=$SHA" >> $GITHUB_OUTPUT

      - name: Login into the container registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Run docker image
        run: docker build -t rgbkeys/pfm-ci-api:${{ steps.generate_tag.outputs.sha }} .

      - name: Push image
        run: docker push rgbkeys/pfm-ci-api:${{ steps.generate_tag.outputs.sha }}